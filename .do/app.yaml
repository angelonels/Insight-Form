name: insightform
region: nyc

services:
  - name: api
    git:
      repo_clone_url: https://github.com/angelonels/Insight-Form.git
      branch: main
    dockerfile_path: apps/api/Dockerfile
    http_port: 4000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        type: GENERAL
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        type: GENERAL
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        type: GENERAL
        value: ${redis.DATABASE_URL}
      - key: CORS_ALLOWED_ORIGINS
        scope: RUN_TIME
        type: GENERAL
        value: ${APP_URL}
      - key: PUBLIC_APP_URL
        scope: RUN_TIME
        type: GENERAL
        value: ${APP_URL}
      - key: LOG_LEVEL
        scope: RUN_TIME
        type: GENERAL
        value: info
      - key: ENABLE_TEST_AUTH
        scope: RUN_TIME
        type: GENERAL
        value: "false"
      - key: CLERK_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: ${CLERK_SECRET_KEY}
      - key: CLERK_JWT_KEY
        scope: RUN_TIME
        type: SECRET
        value: ${CLERK_JWT_KEY}
      - key: BEDROCK_AWS_REGION
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_AWS_REGION}
      - key: BEDROCK_AWS_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
        value: ${BEDROCK_AWS_ACCESS_KEY_ID}
      - key: BEDROCK_AWS_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
        value: ${BEDROCK_AWS_SECRET_ACCESS_KEY}
      - key: BEDROCK_CHAT_MODEL_ID
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_CHAT_MODEL_ID}
      - key: BEDROCK_SMALL_CHAT_MODEL_ID
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_SMALL_CHAT_MODEL_ID}
      - key: BEDROCK_LARGE_CHAT_MODEL_ID
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_LARGE_CHAT_MODEL_ID}
      - key: BEDROCK_EMBEDDING_MODEL_ID
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_EMBEDDING_MODEL_ID}
      - key: BEDROCK_EMBEDDING_DIMENSIONS
        scope: RUN_TIME
        type: GENERAL
        value: "1024"

workers:
  - name: worker
    git:
      repo_clone_url: https://github.com/angelonels/Insight-Form.git
      branch: main
    dockerfile_path: apps/api/Dockerfile
    run_command: node apps/api/dist/modules/jobs/workers.js
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        type: GENERAL
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        type: GENERAL
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        type: GENERAL
        value: ${redis.DATABASE_URL}
      - key: LOG_LEVEL
        scope: RUN_TIME
        type: GENERAL
        value: info
      - key: CLERK_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: ${CLERK_SECRET_KEY}
      - key: CLERK_JWT_KEY
        scope: RUN_TIME
        type: SECRET
        value: ${CLERK_JWT_KEY}
      - key: BEDROCK_AWS_REGION
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_AWS_REGION}
      - key: BEDROCK_AWS_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
        value: ${BEDROCK_AWS_ACCESS_KEY_ID}
      - key: BEDROCK_AWS_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
        value: ${BEDROCK_AWS_SECRET_ACCESS_KEY}
      - key: BEDROCK_CHAT_MODEL_ID
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_CHAT_MODEL_ID}
      - key: BEDROCK_SMALL_CHAT_MODEL_ID
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_SMALL_CHAT_MODEL_ID}
      - key: BEDROCK_LARGE_CHAT_MODEL_ID
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_LARGE_CHAT_MODEL_ID}
      - key: BEDROCK_EMBEDDING_MODEL_ID
        scope: RUN_TIME
        type: GENERAL
        value: ${BEDROCK_EMBEDDING_MODEL_ID}
      - key: BEDROCK_EMBEDDING_DIMENSIONS
        scope: RUN_TIME
        type: GENERAL
        value: "1024"

static_sites:
  - name: web
    git:
      repo_clone_url: https://github.com/angelonels/Insight-Form.git
      branch: main
    build_command: pnpm --filter @insightform/web build
    output_dir: apps/web/dist
    index_document: index.html
    catchall_document: index.html
    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: ${APP_URL}
      - key: VITE_CLERK_PUBLISHABLE_KEY
        scope: BUILD_TIME
        type: GENERAL
        value: ${VITE_CLERK_PUBLISHABLE_KEY}

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    git:
      repo_clone_url: https://github.com/angelonels/Insight-Form.git
      branch: main
    environment_slug: node-js
    build_command: pnpm install --frozen-lockfile
    run_command: pnpm --filter @insightform/api db:migrate
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: GENERAL
        value: ${db.DATABASE_URL}

databases:
  - name: db
    engine: PG
    production: false
  - name: redis
    engine: VALKEY
    production: true
    cluster_name: insightform-redis

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: api
    - match:
        path:
          prefix: /health
      component:
        name: api
    - match:
        path:
          prefix: /
      component:
        name: web
